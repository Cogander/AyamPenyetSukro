<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Owner – Ayam Penyet Sukro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#C0392B;--red-dk:#922B21;--yellow:#F39C12;
  --cream:#FDF6EC;--brown:#5D2E0C;--text:#2C1A0E;
  --muted:#7B6555;--green:#1e8449;--green-lt:#d5f5e3;
  --blue:#1a5276;--blue-lt:#d6eaf8;--orange:#ca6f1e;--orange-lt:#fdebd0;
  --border:#EAD9C8;
}
body{font-family:'Inter',sans-serif;background:#F0EBE3;color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--brown);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.logo{display:flex;align-items:center;gap:.6rem}
.logo-icon{width:38px;height:38px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.logo-text{color:#fff;line-height:1.1}
.logo-text span{font-size:.65rem;color:var(--yellow);font-weight:500;display:block}
.logo-text strong{font-size:1rem;font-family:'Playfair Display',serif}
.header-right{display:flex;align-items:center;gap:.75rem}
.live-badge{background:#e74c3c;color:#fff;border-radius:20px;padding:.3rem .8rem;font-size:.75rem;font-weight:700;display:flex;align-items:center;gap:.3rem;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.refresh-btn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.35rem .75rem;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.refresh-btn:hover{background:rgba(255,255,255,.25)}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;padding:1.2rem 1.5rem;max-width:1100px;margin:0 auto}
.stat-card{background:#fff;border-radius:12px;padding:1rem 1.1rem;border:1px solid var(--border);text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--red)}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:.2rem;font-weight:500}

/* FILTER BAR */
.filter-bar{padding:.5rem 1.5rem 1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;max-width:1100px;margin:0 auto}
.filter-bar label{font-size:.8rem;font-weight:600;color:var(--brown)}
.status-filter{display:flex;gap:.4rem;flex-wrap:wrap}
.sf-btn{background:#fff;border:2px solid var(--border);border-radius:20px;padding:.3rem .85rem;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s}
.sf-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.clear-btn{margin-left:auto;background:var(--red);color:#fff;border:none;border-radius:8px;padding:.35rem .9rem;font-size:.78rem;font-weight:600;cursor:pointer}
.clear-btn:hover{background:var(--red-dk)}

/* ORDERS */
.orders-wrap{padding:0 1.5rem 2.5rem;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
.empty-state{text-align:center;color:var(--muted);padding:4rem 1rem;background:#fff;border-radius:16px;border:1px solid var(--border)}
.empty-state div{font-size:2.5rem;margin-bottom:.8rem}

/* ORDER CARD */
.order-card{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.order-head{padding:.9rem 1.2rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.order-id{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--brown)}
.order-nama{font-weight:700;font-size:1rem;color:var(--text);flex:1}
.order-waktu{font-size:.75rem;color:var(--muted)}
.status-badge{border-radius:20px;padding:.28rem .75rem;font-size:.75rem;font-weight:700;flex-shrink:0}
.status-Baru{background:#fde8e8;color:var(--red)}
.status-Diproses{background:var(--orange-lt);color:var(--orange)}
.status-Selesai{background:var(--green-lt);color:var(--green)}
.status-Dibatalkan{background:#f0f0f0;color:#999}

.order-body{padding:1rem 1.2rem}
.items-table{width:100%;border-collapse:collapse;margin-bottom:.75rem}
.items-table th{text-align:left;font-size:.72rem;font-weight:600;color:var(--muted);padding:.3rem .4rem;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.items-table td{padding:.45rem .4rem;font-size:.85rem;border-bottom:1px solid #F5EEE6;vertical-align:middle}
.items-table tr:last-child td{border-bottom:none}
.item-qty{background:var(--cream);border-radius:6px;padding:.1rem .4rem;font-weight:700;font-size:.8rem;color:var(--brown);display:inline-block}
.item-sub{font-weight:600;color:var(--text)}

.order-foot{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.catatan-box{background:var(--cream);border-radius:10px;padding:.55rem .8rem;font-size:.8rem;color:var(--muted);border-left:3px solid var(--yellow);flex:1;min-width:180px;line-height:1.5}
.catatan-box strong{color:var(--brown);display:block;margin-bottom:.2rem;font-size:.75rem}
.total-box{text-align:right}
.total-box .lbl{font-size:.75rem;color:var(--muted);font-weight:600}
.total-box .amt{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--red)}

.actions{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.act-btn{border:none;border-radius:8px;padding:.4rem .85rem;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-process{background:var(--orange-lt);color:var(--orange)}
.btn-process:hover{background:var(--orange);color:#fff}
.btn-done{background:var(--green-lt);color:var(--green)}
.btn-done:hover{background:var(--green);color:#fff}
.btn-cancel{background:#f0f0f0;color:#999}
.btn-cancel:hover{background:#ddd;color:#555}
.btn-delete{background:#fde8e8;color:var(--red)}
.btn-delete:hover{background:var(--red);color:#fff}

/* PRINT */
.print-area{display:none}
@media print{
  body *{visibility:hidden}
  .print-area,.print-area *{visibility:visible}
  .print-area{display:block;position:fixed;inset:0;padding:1cm;font-family:monospace;font-size:11pt;color:#000;background:#fff}
}

/* RESPONSIVE */
@media(max-width:640px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .order-head{gap:.5rem}
  .order-nama{font-size:.9rem}
  .order-foot{flex-direction:column;align-items:flex-start}
}
@media(max-width:400px){
  .stats-bar{grid-template-columns:1fr 1fr}
  header{padding:0 .9rem}
  .orders-wrap,.stats-bar,.filter-bar{padding-left:.9rem;padding-right:.9rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🍗</div>
    <div class="logo-text">
      <span>Dashboard Owner</span>
      <strong>Ayam Penyet Sukro</strong>
    </div>
  </div>
  <div class="header-right">
    <span class="live-badge">🔴 LIVE</span>
    <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
    <button class="refresh-btn" onclick="clearAll()" style="background:rgba(192,57,43,.4);border-color:rgba(192,57,43,.6)">🗑 Hapus Semua</button>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-val" id="statTotal">0</div>
    <div class="stat-label">Total Pesanan</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statBaru" style="color:#C0392B">0</div>
    <div class="stat-label">🆕 Baru Masuk</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statDiproses" style="color:#ca6f1e">0</div>
    <div class="stat-label">🔄 Diproses</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statOmset" style="color:#1e8449;font-size:1.1rem">Rp 0</div>
    <div class="stat-label">💰 Total Omset</div>
  </div>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <label>Filter Status:</label>
  <div class="status-filter">
    <button class="sf-btn active" onclick="setFilter('Semua',this)">Semua</button>
    <button class="sf-btn" onclick="setFilter('Baru',this)">🆕 Baru</button>
    <button class="sf-btn" onclick="setFilter('Diproses',this)">🔄 Diproses</button>
    <button class="sf-btn" onclick="setFilter('Selesai',this)">✅ Selesai</button>
    <button class="sf-btn" onclick="setFilter('Dibatalkan',this)">❌ Dibatalkan</button>
  </div>
  <button class="clear-btn" onclick="printOrders()">🖨️ Cetak</button>
</div>

<!-- ORDERS -->
<div class="orders-wrap" id="ordersWrap"></div>

<!-- PRINT AREA -->
<div class="print-area" id="printArea"></div>

<script>
const fmt=n=>'Rp '+n.toLocaleString('id-ID');
let activeFilter='Semua';

function getOrders(){
  try{return JSON.parse(localStorage.getItem('sukro_orders')||'[]');}catch(e){return [];}
}
function saveOrders(orders){localStorage.setItem('sukro_orders',JSON.stringify(orders));}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function updateStatus(id,status){
  const orders=getOrders();
  const idx=orders.findIndex(o=>o.id===id);
  if(idx>-1){orders[idx].status=status;saveOrders(orders);}
  renderOrders();
}

function deleteOrder(id){
  if(!confirm('Hapus pesanan '+id+'?'))return;
  const orders=getOrders().filter(o=>o.id!==id);
  saveOrders(orders);
  renderOrders();
}

function clearAll(){
  if(!confirm('Hapus SEMUA pesanan? Tindakan ini tidak bisa dibatalkan!'))return;
  localStorage.removeItem('sukro_orders');
  renderOrders();
}

function loadOrders(){renderOrders();}

function renderOrders(){
  const allOrders=getOrders();
  const filtered=activeFilter==='Semua'?allOrders:allOrders.filter(o=>o.status===activeFilter);

  // Stats
  document.getElementById('statTotal').textContent=allOrders.length;
  document.getElementById('statBaru').textContent=allOrders.filter(o=>o.status==='Baru').length;
  document.getElementById('statDiproses').textContent=allOrders.filter(o=>o.status==='Diproses').length;
  const omset=allOrders.filter(o=>o.status!=='Dibatalkan').reduce((a,o)=>a+o.total,0);
  document.getElementById('statOmset').textContent=fmt(omset);

  const wrap=document.getElementById('ordersWrap');
  if(!filtered.length){
    wrap.innerHTML=`<div class="empty-state"><div>📋</div><strong>Belum ada pesanan</strong><p style="margin-top:.4rem;font-size:.85rem">Pesanan dari pelanggan akan muncul di sini secara otomatis.</p></div>`;
    return;
  }
  wrap.innerHTML=filtered.map(o=>{
    const itemRows=o.items.map(it=>`
      <tr>
        <td>${it.name}</td>
        <td><span class="item-qty">×${it.qty}</span></td>
        <td class="item-sub">${fmt(it.subtotal)}</td>
      </tr>`).join('');

    const canProcess=o.status==='Baru';
    const canDone=o.status==='Diproses';
    const canCancel=o.status!=='Selesai'&&o.status!=='Dibatalkan';

    return `
    <div class="order-card">
      <div class="order-head">
        <span class="order-id">${o.id}</span>
        <span class="order-nama">👤 ${o.nama}</span>
        <span class="order-waktu">🕐 ${o.waktu}</span>
        <span class="status-badge status-${o.status.replace(' ','')}">${
          o.status==='Baru'?'🆕 Baru':
          o.status==='Diproses'?'🔄 Diproses':
          o.status==='Selesai'?'✅ Selesai':'❌ Dibatalkan'
        }</span>
      </div>
      <div class="order-body">
        <table class="items-table">
          <thead><tr><th>Menu</th><th>Qty</th><th>Subtotal</th></tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
        <div class="order-foot">
          <div class="catatan-box">
            <strong>📝 Catatan:</strong>
            ${o.catatan}
          </div>
          <div class="total-box">
            <div class="lbl">Total</div>
            <div class="amt">${fmt(o.total)}</div>
          </div>
        </div>
        <div class="actions" style="margin-top:.75rem">
          ${canProcess?`<button class="act-btn btn-process" onclick="updateStatus('${o.id}','Diproses')">🔄 Proses</button>`:''}
          ${canDone?`<button class="act-btn btn-done" onclick="updateStatus('${o.id}','Selesai')">✅ Selesai</button>`:''}
          ${canCancel?`<button class="act-btn btn-cancel" onclick="updateStatus('${o.id}','Dibatalkan')">❌ Batalkan</button>`:''}
          <button class="act-btn btn-delete" onclick="deleteOrder('${o.id}')">🗑 Hapus</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function printOrders(){
  const orders=getOrders().filter(o=>activeFilter==='Semua'||o.status===activeFilter);
  if(!orders.length){alert('Tidak ada pesanan untuk dicetak.');return;}
  let html=`<h2 style="text-align:center;margin-bottom:1rem">AYAM PENYET SUKRO – PALEMBANG</h2>`;
  html+=`<p style="text-align:center;margin-bottom:1.5rem">Cetak: ${new Date().toLocaleString('id-ID')}</p>`;
  orders.forEach(o=>{
    html+=`<hr/><p><b>No: ${o.id}</b> | Nama: ${o.nama} | ${o.waktu} | Status: ${o.status}</p>`;
    o.items.forEach(it=>html+=`<p style="margin-left:1rem">- ${it.name} x${it.qty} = ${fmt(it.subtotal)}</p>`);
    html+=`<p style="margin-left:1rem"><b>Total: ${fmt(o.total)}</b></p>`;
    html+=`<p style="margin-left:1rem">Catatan: ${o.catatan}</p>`;
  });
  document.getElementById('printArea').innerHTML=html;
  window.print();
}

// Auto-refresh every 15 seconds
setInterval(renderOrders,15000);
renderOrders();
</script>
</body>
</html>
