<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard Owner – Ayam Penyet Sukro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C0392B;--red-dk:#922B21;--yellow:#F39C12;--cream:#FDF6EC;--brown:#5D2E0C;--text:#2C1A0E;--muted:#7B6555;--green:#1e8449;--green-lt:#d5f5e3;--orange:#ca6f1e;--orange-lt:#fdebd0;--border:#EAD9C8}
body{font-family:'Inter',sans-serif;background:#F0EBE3;color:var(--text);min-height:100vh}
header{background:var(--brown);padding:0 1.2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.logo{display:flex;align-items:center;gap:.6rem}
.logo-icon{width:38px;height:38px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.logo-text{color:#fff;line-height:1.1}
.logo-text span{font-size:.65rem;color:var(--yellow);font-weight:500;display:block}
.logo-text strong{font-size:1rem;font-family:'Playfair Display',serif}
.header-right{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.live-badge{background:#e74c3c;color:#fff;border-radius:20px;padding:.3rem .8rem;font-size:.75rem;font-weight:700;display:flex;align-items:center;gap:.3rem;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.hbtn{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.35rem .7rem;font-size:.78rem;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.hbtn:hover{background:rgba(255,255,255,.25)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;padding:1.2rem 1.2rem;max-width:1100px;margin:0 auto}
.stat-card{background:#fff;border-radius:12px;padding:1rem;border:1px solid var(--border);text-align:center}
.stat-val{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--red)}
.stat-label{font-size:.73rem;color:var(--muted);margin-top:.2rem;font-weight:500}
.filter-bar{padding:.2rem 1.2rem .8rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;max-width:1100px;margin:0 auto}
.filter-bar label{font-size:.8rem;font-weight:600;color:var(--brown)}
.sf-btn{background:#fff;border:2px solid var(--border);border-radius:20px;padding:.3rem .85rem;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s}
.sf-btn.active{background:var(--red);border-color:var(--red);color:#fff}
.orders-wrap{padding:0 1.2rem 2.5rem;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}
.empty-state{text-align:center;color:var(--muted);padding:4rem 1rem;background:#fff;border-radius:16px;border:1px solid var(--border)}
.empty-state div{font-size:2.5rem;margin-bottom:.8rem}
.loading{text-align:center;color:var(--muted);padding:3rem;font-size:.9rem}
.order-card{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.order-card.status-Baru{border-left:4px solid var(--red)}
.order-card.status-Diproses{border-left:4px solid var(--orange)}
.order-card.status-Selesai{border-left:4px solid var(--green)}
.order-head{padding:.9rem 1.1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.order-id{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--brown)}
.order-nama{font-weight:700;font-size:.95rem;color:var(--text);flex:1}
.order-waktu{font-size:.73rem;color:var(--muted)}
.status-badge{border-radius:20px;padding:.25rem .7rem;font-size:.73rem;font-weight:700;flex-shrink:0}
.sb-Baru{background:#fde8e8;color:var(--red)}
.sb-Diproses{background:var(--orange-lt);color:var(--orange)}
.sb-Selesai{background:var(--green-lt);color:var(--green)}
.sb-Dibatalkan{background:#f0f0f0;color:#999}
.order-body{padding:.9rem 1.1rem}
.items-table{width:100%;border-collapse:collapse;margin-bottom:.75rem}
.items-table th{text-align:left;font-size:.7rem;font-weight:600;color:var(--muted);padding:.3rem .4rem;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.items-table td{padding:.4rem .4rem;font-size:.84rem;border-bottom:1px solid #F5EEE6;vertical-align:middle}
.items-table tr:last-child td{border-bottom:none}
.item-qty{background:var(--cream);border-radius:6px;padding:.1rem .4rem;font-weight:700;font-size:.78rem;color:var(--brown);display:inline-block}
.order-foot{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding-top:.75rem;border-top:1px solid var(--border)}
.catatan-box{background:var(--cream);border-radius:10px;padding:.5rem .75rem;font-size:.8rem;color:var(--muted);border-left:3px solid var(--yellow);flex:1;min-width:160px;line-height:1.5}
.catatan-box strong{color:var(--brown);display:block;margin-bottom:.2rem;font-size:.73rem}
.total-box{text-align:right}
.total-box .lbl{font-size:.73rem;color:var(--muted);font-weight:600}
.total-box .amt{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--red)}
.actions{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;margin-top:.75rem}
.act-btn{border:none;border-radius:8px;padding:.38rem .8rem;font-size:.76rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.btn-process{background:var(--orange-lt);color:var(--orange)}
.btn-process:hover{background:var(--orange);color:#fff}
.btn-done{background:var(--green-lt);color:var(--green)}
.btn-done:hover{background:var(--green);color:#fff}
.btn-cancel{background:#f0f0f0;color:#999}
.btn-cancel:hover{background:#ddd;color:#555}
.btn-delete{background:#fde8e8;color:var(--red)}
.btn-delete:hover{background:var(--red);color:#fff}
.notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--brown);color:#fff;border-radius:12px;padding:.75rem 1.2rem;font-size:.85rem;font-weight:600;z-index:500;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
.notif.show{opacity:1;transform:translateY(0)}
.new-order-ping{animation:ping 0.5s ease-in-out 3}
@keyframes ping{0%,100%{transform:scale(1)}50%{transform:scale(1.02);box-shadow:0 0 0 4px rgba(192,57,43,.2)}}
@media(max-width:640px){.stats-bar{grid-template-columns:repeat(2,1fr)}.order-head{gap:.4rem}.order-foot{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">🍗</div>
    <div class="logo-text">
      <span>Dashboard Owner</span>
      <strong>Ayam Penyet Sukro</strong>
    </div>
  </div>
  <div class="header-right">
    <span class="live-badge">🔴 LIVE</span>
    <button class="hbtn" onclick="loadOrders()">🔄 Refresh</button>
    <button class="hbtn" onclick="clearAll()" style="background:rgba(192,57,43,.35)">🗑 Hapus Semua</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-val" id="statTotal">–</div>
    <div class="stat-label">Total Pesanan</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statBaru" style="color:#C0392B">–</div>
    <div class="stat-label">🆕 Baru Masuk</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statDiproses" style="color:#ca6f1e">–</div>
    <div class="stat-label">🔄 Diproses</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="statOmset" style="color:#1e8449;font-size:1rem">–</div>
    <div class="stat-label">💰 Total Omset</div>
  </div>
</div>

<div class="filter-bar">
  <label>Filter:</label>
  <button class="sf-btn active" onclick="setFilter('Semua',this)">Semua</button>
  <button class="sf-btn" onclick="setFilter('Baru',this)">🆕 Baru</button>
  <button class="sf-btn" onclick="setFilter('Diproses',this)">🔄 Diproses</button>
  <button class="sf-btn" onclick="setFilter('Selesai',this)">✅ Selesai</button>
  <button class="sf-btn" onclick="setFilter('Dibatalkan',this)">❌ Dibatalkan</button>
</div>

<div class="orders-wrap" id="ordersWrap">
  <div class="loading">⏳ Memuat pesanan...</div>
</div>

<div class="notif" id="notif"></div>

<script>
const SUPA_URL='https://sbikrtvgopgakuiwvekb.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiaWtydHZnb3BnYWt1aXd2ZWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MzcxMjksImV4cCI6MjA5NzUxMzEyOX0.VqHoTkpsehC2Jq7_gjJfbmLgTDuS1eVmDRVJgHVbthI';

const fmt=n=>'Rp '+n.toLocaleString('id-ID');
let activeFilter='Semua';
let allOrders=[];
let lastCount=0;

function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

async function loadOrders(){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/orders?select=*&order=waktu.desc`,{
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    if(!res.ok)throw new Error();
    const data=await res.json();

    // Deteksi pesanan baru
    if(allOrders.length>0 && data.length>lastCount){
      const newCount=data.length-lastCount;
      showNotif(`🔔 ${newCount} pesanan baru masuk!`);
      // Bunyi notifikasi
      try{const ctx=new AudioContext();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.5);}catch(e){}
    }
    lastCount=data.length;
    allOrders=data;
    renderOrders();
  }catch(e){
    document.getElementById('ordersWrap').innerHTML='<div class="empty-state"><div>⚠️</div><strong>Gagal memuat pesanan</strong><p style="margin-top:.4rem;font-size:.85rem">Periksa koneksi internet Anda lalu refresh.</p></div>';
  }
}

function setFilter(f,el){
  activeFilter=f;
  document.querySelectorAll('.sf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function renderOrders(){
  const filtered=activeFilter==='Semua'?allOrders:allOrders.filter(o=>o.status===activeFilter);

  document.getElementById('statTotal').textContent=allOrders.length;
  document.getElementById('statBaru').textContent=allOrders.filter(o=>o.status==='Baru').length;
  document.getElementById('statDiproses').textContent=allOrders.filter(o=>o.status==='Diproses').length;
  const omset=allOrders.filter(o=>o.status!=='Dibatalkan').reduce((a,o)=>a+o.total,0);
  document.getElementById('statOmset').textContent=fmt(omset);

  const wrap=document.getElementById('ordersWrap');
  if(!filtered.length){
    wrap.innerHTML=`<div class="empty-state"><div>📋</div><strong>Belum ada pesanan</strong><p style="margin-top:.4rem;font-size:.85rem">Pesanan dari pelanggan akan muncul di sini otomatis.</p></div>`;
    return;
  }

  wrap.innerHTML=filtered.map(o=>{
    const waktuFmt=new Date(o.waktu).toLocaleString('id-ID',{timeZone:'Asia/Jakarta',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const itemRows=o.items.map(it=>`<tr><td>${it.name}</td><td><span class="item-qty">×${it.qty}</span></td><td style="font-weight:600">${fmt(it.subtotal)}</td></tr>`).join('');
    const statusLabel=o.status==='Baru'?'🆕 Baru':o.status==='Diproses'?'🔄 Diproses':o.status==='Selesai'?'✅ Selesai':'❌ Dibatalkan';
    const canProcess=o.status==='Baru';
    const canDone=o.status==='Diproses';
    const canCancel=o.status!=='Selesai'&&o.status!=='Dibatalkan';
    return `<div class="order-card status-${o.status}">
      <div class="order-head">
        <span class="order-id">${o.id}</span>
        <span class="order-nama">👤 ${o.nama}</span>
        <span class="order-waktu">🕐 ${waktuFmt}</span>
        <span class="status-badge sb-${o.status}">${statusLabel}</span>
      </div>
      <div class="order-body">
        <table class="items-table">
          <thead><tr><th>Menu</th><th>Qty</th><th>Subtotal</th></tr></thead>
          <tbody>${itemRows}</tbody>
        </table>
        <div class="order-foot">
          <div class="catatan-box"><strong>📝 Catatan:</strong>${o.catatan}</div>
          <div class="total-box"><div class="lbl">Total</div><div class="amt">${fmt(o.total)}</div></div>
        </div>
        <div class="actions">
          ${canProcess?`<button class="act-btn btn-process" onclick="updateStatus('${o.id}','Diproses')">🔄 Proses</button>`:''}
          ${canDone?`<button class="act-btn btn-done" onclick="updateStatus('${o.id}','Selesai')">✅ Selesai</button>`:''}
          ${canCancel?`<button class="act-btn btn-cancel" onclick="updateStatus('${o.id}','Dibatalkan')">❌ Batalkan</button>`:''}
          <button class="act-btn btn-delete" onclick="deleteOrder('${o.id}')">🗑 Hapus</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function updateStatus(id,status){
  try{
    await fetch(`${SUPA_URL}/rest/v1/orders?id=eq.${id}`,{
      method:'PATCH',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY},
      body:JSON.stringify({status})
    });
    showNotif('✅ Status pesanan diperbarui!');
    await loadOrders();
  }catch(e){alert('Gagal update status.');}
}

async function deleteOrder(id){
  if(!confirm('Hapus pesanan '+id+'?'))return;
  try{
    await fetch(`${SUPA_URL}/rest/v1/orders?id=eq.${id}`,{
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    showNotif('🗑 Pesanan dihapus.');
    await loadOrders();
  }catch(e){alert('Gagal hapus.');}
}

async function clearAll(){
  if(!confirm('Hapus SEMUA pesanan? Tidak bisa dibatalkan!'))return;
  try{
    await fetch(`${SUPA_URL}/rest/v1/orders?id=neq.xxx`,{
      method:'DELETE',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}
    });
    showNotif('🗑 Semua pesanan dihapus.');
    await loadOrders();
  }catch(e){alert('Gagal hapus semua.');}
}

// Auto refresh setiap 10 detik
loadOrders();
setInterval(loadOrders,10000);
</script>
</body>
</html>
